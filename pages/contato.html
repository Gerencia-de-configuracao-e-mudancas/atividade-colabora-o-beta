<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contato</title>

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="../style.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background: #fff;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 420px;
        }

        h2 {
            text-align: center;
            margin-bottom: 10px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }

        input,
        textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        textarea {
            resize: none;
            height: 100px;
        }

        button {
            width: 100%;
            padding: 10px;
            border: none;
            background: #007BFF;
            color: white;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #0056b3;
        }

        .success {
            margin-top: 15px;
            color: green;
            text-align: center;
            display: none;
        }

        .team-section {
            margin-top: 25px;
            text-align: center;
        }

        .team-cards {
            display: flex;
            gap: 10px;
        }

        .card {
            flex: 1;
            background: #f9f9f9;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
            transition: transform 0.2s;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .icon {
            font-size: 28px;
            margin-bottom: 10px;
        }

        .card p {
            font-size: 14px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .socials {
            display: flex;
            justify-content: center;
            gap: 10px;
        }

        .socials a {
            font-size: 18px;
            transition: transform 0.2s;
        }

        .socials a:hover {
            transform: scale(1.2);
        }

        .socials a:nth-child(1) {
            color: #25D366;
        }

        .socials a:nth-child(2) {
            color: #E4405F;
        }

        .socials a:nth-child(3) {
            color: #0077B5;
        }

        .socials a:nth-child(4) {
            color: #333;
        }

        @media (max-width: 480px) {
            .team-cards {
                flex-direction: column;
            }
        }
    </style>
</head>

<body>

    <main>
        <div class="container">
            <h2>Fale Conosco</h2>

            <form id="contactForm">
                <div class="form-group">
                    <label>Nome</label>
                    <input type="text" required>
                </div>

                <div class="form-group">
                    <label>Email</label>
                    <input type="email" required>
                </div>

                <div class="form-group">
                    <label>Mensagem</label>
                    <textarea required></textarea>
                </div>

                <button type="submit">Enviar</button>
            </form>

            <div class="success" id="successMessage">Mensagem enviada com sucesso!</div>

            <div class="team-section">
                <h3>Equipe</h3>
                <div class="team-cards">

                    <div class="card">
                        <div class="icon"><i class="fa-solid fa-user"></i></div>
                        <p>Douglas Morais</p>
                        <div class="socials">
                            <a href="#"><i class="fa-brands fa-whatsapp"></i></a>
                            <a href="#"><i class="fa-brands fa-instagram"></i></a>
                            <a href="#"><i class="fa-brands fa-linkedin"></i></a>
                            <a href="#"><i class="fa-brands fa-github"></i></a>
                        </div>
                    </div>

                    <div class="card">
                        <div class="icon"><i class="fa-solid fa-user"></i></div>
                        <p>Jeffersson Alves</p>
                        <div class="socials">
                            <a href="#"><i class="fa-brands fa-whatsapp"></i></a>
                            <a href="#"><i class="fa-brands fa-instagram"></i></a>
                            <a href="#"><i class="fa-brands fa-linkedin"></i></a>
                            <a href="#"><i class="fa-brands fa-github"></i></a>
                        </div>
                    </div>

                    <div class="card">
                        <div class="icon"><i class="fa-solid fa-user"></i></div>
                        <p>Wesley Oliveira</p>
                        <div class="socials">
                            <a href="#"><i class="fa-brands fa-whatsapp"></i></a>
                            <a href="#"><i class="fa-brands fa-instagram"></i></a>
                            <a href="#"><i class="fa-brands fa-linkedin"></i></a>
                            <a href="#"><i class="fa-brands fa-github"></i></a>
                        </div>
                    </div>

                </div>
            </div>
        </div>
    </main>


    <script>
        const form = document.getElementById('contactForm');
        const successMessage = document.getElementById('successMessage');

        form.addEventListener('submit', function (e) {
            e.preventDefault();
            successMessage.style.display = 'block';
            form.reset();
        });
    </script>

</body>

</html>
